<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>গ্রন্থকানন</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f6f8;
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#fff;
position:sticky;
top:0;
}

.header{
text-align:center;
padding:20px;
background:#fff;
}

.logo{
width:120px;
}

.banner img{
width:100%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#fff;
padding:10px;
text-align:center;
border-radius:10px;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

button{
background:#27ae60;
color:#fff;
border:none;
padding:8px;
width:100%;
cursor:pointer;
}

.cart-btn{
position:fixed;
bottom:20px;
left:20px;
background:#27ae60;
color:white;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
}

.cart-box{
display:none;
position:fixed;
right:20px;
bottom:80px;
width:300px;
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.wa{
position:fixed;
bottom:20px;
right:20px;
font-size:30px;
}

</style>
</head>

<body>

<div class="navbar">
<div>☰ গ্রন্থকানন</div>
<div>🔍 🛒</div>
</div>

<div class="header">
<img src="logoo.jpeg" class="logo">
<p>ইসলামিক বইয়ের দোকান</p>
</div>

<div class="banner">
<img src="cover.jpeg">
</div>

<h2 style="text-align:center;">বইয়ের তালিকা</h2>

<div class="products">

<header class="header">
    <img src="logoo.jpeg" class="logo">
    <p>ইসলামিক বইয়ের নির্ভরযোগ্য দোকান</p>

    <input type="text" id="search" onkeyup="searchProduct()" placeholder="🔍 বই খুঁজুন...">
</header>

<h2 class="title">📚 জনপ্রিয় বই</h2>

<div class="products" id="productList">

    <div class="card" data-name="প্যারাডক্সিক্যাল সাজিদ">
        <img src="https://co.com">
        <h3>প্যারাডক্সিক্যাল সাজিদ</h3>
        <p>৳220</p>
        <button onclick="addToCart('প্যারাডক্সিক্যাল সাজিদ',220)">কার্টে যোগ</button>
    </div>

    <div class="card" data-name="দোয়ার ডায়েরি">
        <img src="https://co.com">
        <h3>দোয়ার ডায়েরি</h3>
        <p>৳230</p>
        <button onclick="addToCart('দোয়ার ডায়েরি',230)">কার্টে যোগ</button>
    </div>
</div>

<a class="wa" href="https://wa.me/8801516595762" target="_blank">💬</a>

<script>
let cart = [];

function addToCart(name, price){
cart.push({name, price});
document.getElementById("count").innerText = cart.length;
updateCart();
}

function openCart(){
document.getElementById("cartBox").style.display="block";
}

function closeCart(){
document.getElementById("cartBox").style.display="none";
}

function updateCart(){

let box = document.getElementById("cartItems");
box.innerHTML = "";

let total = 0;

cart.forEach(i=>{
box.innerHTML += `<p>${i.name} - ৳${i.price}</p>`;
total += i.price;
});

document.getElementById("total").innerText = total;
}

function checkout(){

let msg = "নতুন অর্ডার:\n\n";
let total = 0;

cart.forEach(i=>{
msg += `${i.name} - ৳${i.price}\n`;
total += i.price;
});

msg += "\nTotal: ৳" + total;

let url = "https://wa.me/8801516595762?text=" + encodeURIComponent(msg);

window.open(url,"_blank");

cart = [];
document.getElementById("count").innerText = 0;
document.getElementById("cartBox").style.display="none";
}
</script>

</body>
</html>
